<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AirPlay WebRTC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden}
#v{width:100vw;height:100vh;object-fit:contain;display:block}
#status{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.7);color:#fff;padding:5px 18px;
  border-radius:20px;font:13px/1.8 sans-serif;pointer-events:none;
  transition:opacity .5s
}
</style>
</head>
<body>
<video id="v" autoplay playsinline muted></video>
<div id="status">Connecting…</div>
<button id="unmute" style="
  display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  padding:10px 28px;border:none;border-radius:24px;background:rgba(255,255,255,.9);
  font:15px sans-serif;cursor:pointer;z-index:10">🔇 Tap to unmute</button>

<!--
  mediasoup-client.bundle.js is generated by "npm run build" (esbuild).
  Run "npm install" once in the mediasoup-server directory to produce it.
-->
<script src="/mediasoup-client.bundle.js"></script>
<script>
'use strict';

const statusEl = document.getElementById('status');
const videoEl  = document.getElementById('v');
const unmuteBtn = document.getElementById('unmute');

let activeWs = null;
let activeTransport = null;
let reconnectTimer = null;
let connecting = false;
let stopped = false;
let sessionSeq = 0;

unmuteBtn.addEventListener('click', () => {
    videoEl.muted = false;
    unmuteBtn.style.display = 'none';
});

function setStatus(text, fade) {
    statusEl.style.opacity = '1';
    statusEl.textContent   = text;
    if (fade) setTimeout(() => { statusEl.style.opacity = '0'; }, 2500);
}

function clearReconnectTimer() {
    if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
    }
}

function scheduleReconnect(delayMs = 1500) {
    if (stopped || reconnectTimer) return;
    setStatus('Disconnected - reconnecting...');
    reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connect().catch(() => {});
    }, delayMs);
}

function closeActiveSession() {
    if (activeTransport) {
        try { activeTransport.close(); } catch {}
        activeTransport = null;
    }
    if (activeWs) {
        try { activeWs.onclose = null; } catch {}
        try { activeWs.onerror = null; } catch {}
        try { activeWs.close(); } catch {}
        activeWs = null;
    }
}

window.addEventListener('beforeunload', () => {
    stopped = true;
    clearReconnectTimer();
    closeActiveSession();
});

async function connect() {
    if (stopped || connecting) return;
    if (activeWs &&
        (activeWs.readyState === WebSocket.OPEN ||
         activeWs.readyState === WebSocket.CONNECTING)) {
        return;
    }

    connecting = true;
    const sessionId = ++sessionSeq;

    setStatus('Connecting…');

    try {
        const device = new mediasoupClient.Device();
        const proto  = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws     = new WebSocket(`${proto}//${location.host}`);
        activeWs = ws;

        /** Promise helpers so we can await individual WS messages by type. */
        const pending = {};
        function failPending(reason) {
            for (const k of Object.keys(pending)) {
                const p = pending[k];
                delete pending[k];
                if (p && p.reject) p.reject(reason);
            }
        }

        ws.onmessage = (evt) => {
            let msg;
            try {
                msg = JSON.parse(evt.data);
            } catch {
                return;
            }

            if (pending[msg.type]) {
                const { resolve } = pending[msg.type];
                delete pending[msg.type];
                resolve(msg.data !== undefined ? msg.data : msg);
            } else if (msg.type === 'error') {
                console.error('[ws] server error:', msg.message);
            }
        };

        function send(obj) {
            if (ws.readyState === WebSocket.OPEN)
                ws.send(JSON.stringify(obj));
        }
        function waitFor(type) {
            return new Promise((resolve, reject) => {
                pending[type] = { resolve, reject };
            });
        }

        ws.onerror = () => {
            if (sessionId !== sessionSeq) return;
            setStatus('Network error - reconnecting...');
        };

        ws.onclose = () => {
            if (sessionId !== sessionSeq) return;
            failPending(new Error('WebSocket closed'));
            if (activeTransport) {
                try { activeTransport.close(); } catch {}
                activeTransport = null;
            }
            activeWs = null;
            scheduleReconnect(1200);
        };

        await new Promise((resolve, reject) => {
            ws.onopen = resolve;
            ws.onerror = () => reject(new Error('WebSocket connect failed'));
        });

        ws.onerror = () => {
            if (sessionId !== sessionSeq) return;
            setStatus('Network error - reconnecting...');
        };

        /* ---- Step 1: load Device with router RTP capabilities ---- */
        send({ type: 'getRtpCapabilities' });
        const rtpCapabilities = await waitFor('rtpCapabilities');
        await device.load({ routerRtpCapabilities: rtpCapabilities });

        /* ---- Step 2: create receive transport ---- */
        send({ type: 'createTransport' });
        const transportParams = await waitFor('transportCreated');

        let connectResolve;
        const recvTransport = device.createRecvTransport(transportParams);
        activeTransport = recvTransport;

        recvTransport.on('connect', ({ dtlsParameters }, callback) => {
            connectResolve = callback;
            send({ type: 'connectTransport', dtlsParameters });
        });

        /* ---- Step 3: request consumers from server ---- */
        send({ type: 'consume', rtpCapabilities: device.rtpCapabilities });
        const consumerParams = await waitFor('consumed');

        /* ---- Step 4: create client-side consumers ---- */
        waitFor('transportConnected').then(() => {
            if (connectResolve) {
                connectResolve();
                connectResolve = null;
            }
        }).catch(() => {});

        const tracks = { video: null, audio: null };
        for (const params of consumerParams) {
            const consumer = await recvTransport.consume(params);
            tracks[consumer.kind] = consumer.track;

            if (consumer.kind === 'video') {
                fetch('/viewer-ready').catch(() => {});
            }
        }

        if (tracks.video) {
            const stream = new MediaStream([tracks.video]);
            if (tracks.audio) stream.addTrack(tracks.audio);
            videoEl.srcObject = stream;
            unmuteBtn.style.display = 'block';
        }

        clearReconnectTimer();
        setStatus('Connected ✓', true);
    } catch (err) {
        console.error(err);
        setStatus('Error: ' + err.message);
        closeActiveSession();
        scheduleReconnect(1500);
    } finally {
        connecting = false;
    }
}

connect().catch(() => {});
</script>
</body>
</html>
